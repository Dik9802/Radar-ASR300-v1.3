[GPS_TCP]
listen_port = 5001           ; Puerto TCP donde el GPS envía datos NMEA (escucha en 0.0.0.0)

[LPR_CAM_WEBSERVER]
listen_port = 8899           ; Puerto HTTP donde la cámara LPR envía JSON (escucha en 0.0.0.0)

[NPU_CAM_WEBSERVER]
listen_port = 8898           ; Puerto HTTP donde la cámara NPU envía JSON al endpoint /npu

[LED_CONTROLLER_WEBSERVER]
listen_port = 8081           ; Puerto HTTP para la API del display (escucha en 0.0.0.0)

[LPR_QUEUE]
enabled = true               ; Activar gestor de cola LPR
workers = 3                  ; Número de workers que procesan placas
max_size = 100               ; Tamaño máximo de la cola de tareas

[NPU_QUEUE]
enabled = true               ; Activar gestor de cola del endpoint /npu
workers = 2                  ; Número de workers que procesan payloads NPU
max_size = 100               ; Tamaño máximo de la cola de tareas

[RADAR_TCP]
model = LDTR20               ; Modelo de radar. Opciones: LDTR20 (actual), STALKER, TSR20 (futuros)
listen_port = 2222           ; Puerto TCP donde el radar envía velocidades (escucha en 0.0.0.0)
add_noise = false            ; Agregar ruido aleatorio a velocidades (para testing)
log_rx = true                ; Loguear velocidades recibidas
update_min_delta_ms = 1000   ; Mínimo tiempo entre actualizaciones de velocidad (ms)

[RADAR_SIMULATOR]
on = false                    ; Si true, envía velocidades simuladas periódicas
interval_ms = 350           ; Intervalo en ms entre envíos de velocidad simulada
max_speed = 80             ; Velocidad máxima (km/h) del simulador
min_speed = 1               ; Velocidad mínima (km/h) del simulador

[LED_CONTROLLER]
host = 192.168.0.222         ; Dirección IP del controlador de pantalla LED
port = 5200                  ; Puerto TCP del controlador LED
id_code = 0xFFFFFFFF         ; Código de identificación (4 bytes)
card_id = 0xFF               ; ID de tarjeta (0xFF = broadcast)
flags = 0x00                 ; Flags de comunicación (0x01 = solicitar ACK, 0x00 = sin ACK, GIF rápido ~200ms vs ~2500ms)
timeout_seconds = 2          ; Timeout para operaciones TCP
reconnect_interval = 10.0     ; Intervalo en segundos entre reintentos de conexión
delay_before_close_ms = 500  ; Esperar N ms antes de cerrar la conexión TCP (da tiempo al display a procesar). Sin ACK el TCP queda ~500ms + show_plate_time=1s → total ~1.5s

[DISPLAY_MANAGER]
poll_sleep = 0.02            ; Tiempo de espera en el loop de recepción de placas detectadas
queue_maxsize = 10          ; Tamaño máximo de cola de eventos
speed_limit_kmph = 30        ; Límite de velocidad para determinar color (km/h)
show_plate_pic = true
show_plate_scene = false
show_plate_text = true
show_plate_speed = true      ; Si true, exige velocidad reciente (≤10s) del radar para mostrar la placa; si false, muestra placa aunque no haya velocidad
show_plate_time = 1        ; Tiempo que la placa permanece en pantalla (texto, imagen pequeña o escena). Acepta decimales.
show_speed_time = 1          ; Tiempo mínimo que una velocidad permanece en pantalla antes de ser reemplazada por otra velocidad. Acepta decimales.
speed_idle_timeout_s = 2.0     ; Si el radar deja de enviar velocidades durante N segundos, el LED se pone en IDLE (programa 1). Debe ser MAYOR que el gap típico entre velocidades reales del radar para evitar parpadeos entre mediciones consecutivas.
plate_gif_budget_s = 1.5       ; Presupuesto estimado (s) para la transferencia TCP del GIF al LED. Durante este tiempo + show_plate_time, el sistema descarta placas entrantes (evita churn de placas consecutivas). Ajustar si cambia el tamaño del display o la red.
plate_cooldown_s = 0.0         ; Tiempo extra (s) tras mostrar una placa donde NI velocidades NI otras placas pueden alterar el LED. Evita que una velocidad tumbe la placa apenas expire su display. Subir si el parpadeo post-placa persiste.
show_plate_font_size = 40      ; Tamaño de fuente del texto de placa (siempre 40px)
require_ack = true            ; Siempre activo: si llega ACK se cierra conexión inmediatamente; si no, se espera 500ms y se cierra
display_width = 128         ; Ancho del display LED en píxeles (0 = no redimensionar). La imagen se ajusta (fit) antes de enviar.
display_height = 96          ; Alto del display LED en píxeles (0 = no redimensionar).
plate_prefix = PLACA        ; Texto que aparece antes de la placa (ej: "PLACA ABC123")
min_interval_s = 1.2         ; Mínimo de segundos entre mostrar placas diferentes
debounce_s = 2.5             ; Tiempo para ignorar la misma placa repetida
mode = DRAW                  ; Modo de texto (siempre DRAW, no es opcional)
color = GREEN                ; Color del texto (RED, GREEN, YELLOW, BLUE, PURPLE, CYAN, WHITE)
align = CENTER               ; Alineación (LEFT, CENTER, RIGHT)
auto_fit_plate = false       ; Ajustar automáticamente tamaño de fuente según longitud
text_mode_resend_interval = 15 ; Intervalo en segundos para reenviar el mensaje en modo texto (0 = desactivar)

[LED_LOWLEVEL_DEFAULTS]
window_no = 0                ; Número de ventana (0-7)
mode = 0                     ; Modo de visualización (0=Draw, 1=Immediate, 2=Cover)
speed = 0                    ; Velocidad de animación
chunk_size = 200             ; Tamaño de chunk de datos por paquete
gif_offset_y = 8             ; Desplazamiento vertical (px) al enviar GIF

[HTTP_CLIENT]
enabled = true                                      ; Habilitar transmisión HTTP
base_url = https://via-lab.online:7000/api/plate_event  ; URL del servidor HTTP de destino
device_id = 860000000000001                         ; Identificador del dispositivo/radar (IMEI)
timeout_seconds = 30                                 ; Timeout para peticiones HTTP
max_retries = 3                                     ; Número máximo de reintentos
retry_delay_ms = 2000                               ; Delay entre reintentos en milisegundos
use_iso_datetime = true                             ; Usar formato ISO 8601 para fechas
timezone = America/Bogota                           ; Zona horaria para timestamps

[SFTP]
host = cloudvialab.com      ; Servidor SFTP
port = 22                    ; Puerto SSH/SFTP (estándar: 22)
user = lpr                   ; Usuario SFTP
password = h5R3h98Kpw        ; Contraseña del usuario
enable_queue = true          ; Activar cola no bloqueante para subidas asíncronas
queue_workers = 2            ; Número de hilos simultáneos para subir imágenes
remote_dir_street = /LPR/street  ; Carpeta remota para imagen completa (contexto/road)
remote_dir_plate = /LPR/plate     ; Carpeta remota para recorte de placa

[DATABASE]
enabled = false              ; Habilitar guardado en PostgreSQL (false = sistema funciona sin BD)
enable_offline_queue = true  ; Guardar transmisiones fallidas para reintento posterior (requiere ENABLED=true)
db_host = localhost          ; Dirección del servidor PostgreSQL
db_port = 5417               ; Puerto del servidor PostgreSQL (default: 5432)
db_name = postgres       ; Nombre de la base de datos
db_user = postgres            ; Usuario de PostgreSQL
db_password = postgres               ; Contraseña del usuario (dejar vacío si no requiere)
max_retry_attempts = 5       ; Máximo número de reintentos antes de marcar como fallida
retry_interval_minutes = 5   ; Minutos de espera antes de reintentar una transmisión
cleanup_days = 30            ; Eliminar registros exitosos/fallidos después de X días

[UPLOAD_MANAGER]
enabled = true               ; Activar el gestor de subida automática
check_interval_seconds = 1   ; Cada cuántos segundos revisar la BD para subir transmisiones pendientes
batch_size = 5               ; Número de transmisiones a procesar por ciclo

[RETRY_MANAGER]
enabled = true               ; Activar el gestor de reintentos automáticos
check_interval_seconds = 30  ; Cada cuántos segundos verificar transmisiones pendientes
batch_size = 5               ; Número de transmisiones a procesar por ciclo
cleanup_interval_hours = 24  ; Cada cuántas horas limpiar registros antiguos

[LOGGING]
level = INFO                 ; Nivel de log (DEBUG, INFO, WARNING, ERROR, CRITICAL)

[DISPLAY_STATE]
mode = radar
text_message = 
text_color = GREEN
text_font_size = 24
text_align = CENTER
text_mode = DRAW
text_speed = 1
text_stay_time = 10

[WEB_PANEL]
enabled = true               ; Habilitar panel web Django + AdminLTE
port = 8082                  ; Puerto HTTP del panel de configuración

